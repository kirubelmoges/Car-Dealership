services:
  # Backend API - NO DATABASE
  - type: web
    name: backend
    runtime: python
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn djangoproj.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://frontend.onrender.com

  # Frontend
  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
