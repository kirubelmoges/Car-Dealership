services:
  # Frontend Only - Static React App
  - type: web
    name: car-dealership
    runtime: static
    rootDir: frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
