services:
  # Backend API (SQLite - no credit card needed)
  - type: web
    name: backend
    runtime: python
    rootDir: server
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
    startCommand: gunicorn djangoproj.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: dealership-frontend
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3

  # Frontend
  - type: web
    name: frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: dealership-backend
